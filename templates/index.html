<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Focus</title>
        <meta name="author" content="Yogesh Nayaka"/>
        <meta name="description" content="FastAPI website"/>
        <link rel="stylesheet" href="../static/style.css" type="text/css"/>
    </head>
    <body>
        <div class="main">
            <!--Title-->
            <nav class="nav-bar">
                <h2>Focus</h2>
                <p>Sat, 23 May</p>
            </nav>

            <!--Status/Progress bar-->
            <div class="status-bar">
                <div class="total-status status-block">
                    <div class="status-count">6</div>
                    <div class="status-name">Total</div>
                </div>
                <div class="completed-status status-block">
                    <div class="status-count">6</div>
                    <div class="status-name">Done</div>
                </div>
                <div class="incomplete-status status-block">
                    <div class="status-count">6</div>
                    <div class="status-name">Left</div>
                </div>
            </div>

            <!--Add Goal-->
            <div class="input-goal">
                <input type="text" id="input-text" placeholder="Add a goal or task">
                <select id="priority">
                    <option value="low">Low</option>
                    <option value="medium">Mediun</option>
                    <option value="high">High</option>
                </select>
            </div>

            <!--Sort buttons-->
            <div class="filter">
                <button class="chip active">All</button>
                <button class="chip">Active</button>
                <button class="chip">Done</button>
                <div class="horizontal-line"></div>
                <button class="chip">High</button>
                <button class="chip">Medium</button>
                <button class="chip">Low</button>
            </div>

            <!--Task List-->
            <div class="task-list">
                <p class="list-heading">List</p>
                <div class="list-block high-priority" id="1">
                    <input type="checkbox" value="done">
                    <p class="list-point">Complete The ToDo List</p>
                    <p class="priority-display">high</p>
                </div>
                <div class="list-block medium-priority" id="2">
                    <input type="checkbox" value="done">
                    <p class="list-point">Complete The ToDo List</p>
                    <p class="priority-display">med</p>
                </div>
                <div class="list-block low-priority" id="1">
                    <input type="checkbox" value="done">
                    <p class="list-point">Complete The ToDo List</p>
                    <p class="priority-display">low</p>
                </div>

                <!-- <div class="list-block medium-priority" id="2">
                    <p class="list-point">Complete The ToDo List</p>
                </div>
                <div class="list-block low-priority" id="3">
                    <p class="list-point">Complete The ToDo List</p>
                </div> -->
            </div>
        </div>
    </body>
</html>
